---
- name: Configuration de base pour Kubernetes
  hosts: k8s
  become: true

  tasks:

    # ── Prerequis systeme ──────────────────────────────
    - name: Desactiver le swap
      shell: swapoff -a

    - name: Supprimer le swap du fstab
      lineinfile:
        path: /etc/fstab
        regexp: '.*swap.*'
        state: absent

    - name: Charger les modules noyau requis
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf

    - name: Activer les modules
      shell: modprobe overlay && modprobe br_netfilter

    - name: Configurer sysctl pour Kubernetes
      copy:
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        dest: /etc/sysctl.d/k8s.conf

    - name: Appliquer sysctl
      shell: sysctl --system

    # ── Installer VMware Tools ─────────────────────────
    - name: Installer open-vm-tools
      apt:
        name: open-vm-tools
        state: present
        update_cache: true

    # ── Installer containerd ───────────────────────────
    - name: Installer containerd et dependances
      apt:
        name:
          - containerd
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Creer le dossier config containerd
      file:
        path: /etc/containerd
        state: directory

    - name: Generer la config containerd
      shell: containerd config default > /etc/containerd/config.toml

    - name: Activer SystemdCgroup dans containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Redemarrer containerd
      service:
        name: containerd
        state: restarted
        enabled: true

    # ── Installer kubeadm, kubelet, kubectl ────────────
    - name: Creer le dossier keyrings
      file:
        path: /etc/apt/keyrings
        state: directory

    - name: Ajouter la cle GPG Kubernetes
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key \
        | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Ajouter le repo Kubernetes
      copy:
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /
        dest: /etc/apt/sources.list.d/kubernetes.list

    - name: Installer kubeadm kubelet kubectl
      apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        update_cache: true

    - name: Figer les versions K8s
      shell: apt-mark hold kubeadm kubelet kubectl

    - name: Activer kubelet
      service:
        name: kubelet
        enabled: true
