---
- name: Recuperer la commande join
  hosts: master
  become: true
  tasks:
    - name: Generer la commande join
      shell: kubeadm token create --print-join-command
      register: join_command

    - name: Stocker la commande
      set_fact:
        k8s_join_command: "{{ join_command.stdout }}"

- name: Rejoindre le cluster
  hosts: workers
  become: true
  tasks:
    - name: Verifier si deja dans le cluster
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Rejoindre le cluster
      shell: "{{ hostvars[groups['master'][0]].k8s_join_command }}"
      when: not kubelet_conf.stat.exists
