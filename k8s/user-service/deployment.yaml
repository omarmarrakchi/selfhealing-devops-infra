apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: devops-task-manager
  labels:
    app: user-service
spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: user-service
    spec:
      restartPolicy: Always

      containers:
        - name: user-service
          image: omarmarrakchi/task-manager-user-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8001

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: POSTGRES_SCHEMA
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_SCHEMA_USERS

          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
