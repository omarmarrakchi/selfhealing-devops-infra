apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: devops-task-manager
  labels:
    app: task-service
spec:
  type: ClusterIP               # interne au cluster uniquement
  selector:
    app: task-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
